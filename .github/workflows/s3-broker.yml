name: s3-broker

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/s3-broker.yml
      - helm/configs/s3-broker/development/**
      - helm/configs/s3-broker/values.yaml
      - helm/configs/s3-broker/config
  push:
    branches: [main]
    paths:
      - .github/workflows/s3-broker.yml
      - helm/configs/s3-broker/qa/**
      - helm/configs/s3-broker/values.yaml
      - helm/configs/s3-broker/config
  release:
    types: [published]

jobs:
  set_env:
    uses: ./.github/workflows/reusable.environment.yml

  deploy:
    if: (!needs.set_env.outputs.component) || needs.set_env.outputs.component == 'sb'
    runs-on: ubuntu-latest
    environment: ${{ needs.set_env.outputs.environment }}
    needs:
      - set_env
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Open ssh tunnel
        uses: paulscherrerinstitute/scicat-ci/.github/actions/open-ssh-tunnel@b4da1ca8afb1aac8b95bff96f98e70ae1f83aa35
        with:
          bastion_user: "${{ secrets.BASTION_USER }}"
          bastion_ssh_key: "${{ secrets.BASTION_SSH_KEY }}"

      - name: deploy
        uses: paulscherrerinstitute/scicat-ci/.github/actions/deploy-helm@b4da1ca8afb1aac8b95bff96f98e70ae1f83aa35
        with:
          release: "${{ env.RELEASE_NAME }}"
          namespace: "${{ env.NAMESPACE_PREFIX }}${{ env.ENVIRONMENT }}"
          chart: oci://ghcr.io/paulscherrerinstitute/dc-charts/generic-service
          version: 1.0.0
          value-files: >-
            helm/configs/${{ env.RELEASE_NAME }}/values.yaml
            helm/configs/${{ env.RELEASE_NAME }}/${{ env.ENVIRONMENT }}/values.yaml
          secrets: ${{ toJSON(secrets) }}
          files: >-
            AWS_CONFIG=helm/configs/s3-broker/config
        env:
          KUBECONFIG_FILE: "${{ secrets.KUBECONFIG }}"
          RELEASE_NAME: s3-broker
          ENVIRONMENT: "${{ needs.set_env.outputs.environment }}"
          NAMESPACE_PREFIX: scicat-
