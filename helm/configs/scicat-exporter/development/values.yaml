host: scicat-exporter.development.psi.ch

env:
  - name: QUARKUS_REST_CLIENT_SCICAT_URL
    value: http://backend-next.scicat-development
  - name: QUARKUS_REST_CLIENT_S3BROKER_URL
    value: http://s3-broker.scicat-development
  - name: QUARKUS_HTTP_LIMITS_MAX_BODY_SIZE
    value: 50M

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    b64/nginx.ingress.kubernetes.io/whitelist-source-range: "{{ .Values.secretsJson.EXPORTER_WHITELIST_IPS }}"
  hosts:
    - host: "{{ .Values.host }}"
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - hosts:
        - "{{ .Values.host }}"
      secretName: "scicat-exporter-certificate"
