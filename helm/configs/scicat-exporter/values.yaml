replicaCount: 1

image:
  repository: ghcr.io/paulscherrerinstitute/scicat-rocrate
  tag: 2.5.5
  pullPolicy: Always

service:
  type: ClusterIP
  externalPort: 80
  internalPort: 8080
  probePath: /api/v1/health/live

ingress:
  enabled: true
  annotations:
    # required since nginx routes only /api/v1/zenodo, causing the HTTP-01
    # ACME challenge path (/.well-known/acme-challenge/) to return 404;
    # this makes cert-manager inject the challenge path directly into this
    # ingress instead of creating a separate solver ingress that loses the
    # routing competition
    acme.cert-manager.io/http01-edit-in-place: "true"
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
  hosts:
    - host: "{{ .Values.host }}"
      paths:
        - path: "/api/v1/zenodo"
          pathType: Prefix
  tls:
    - hosts:
        - "{{ .Values.host }}"
      secretName: "scicat-exporter-certificate"
