image:
  repository: "{{ .Values.ciRepository }}"
  tag: "{{ .Values.ciTag }}"

env:
  - name: SCICAT_ENDPOINT
    value: "{{ .Values.scicatEndpoint }}"
  - name: DUO_ENDPOINT
    value: https://duo.psi.ch/duo/api.php/v1/

volumes:
  - name: secrets-volume
    secret:
      secretName: "{{ .Release.Name }}-s"

secrets: 
  "{{ .Release.Name }}-s":
    type: Opaque
    data: 
      .env: "{{ .Values.secretsJson.PROPOSAL_ENV }}"

volumeMounts:
  - name: secrets-volume
    mountPath: /usr/src/proposals/.env
    subPath: .env

cronjob:
  ttlSecondsAfterFinished: 691200 # 8 days (7+1 of buffer)

# Keep the pre-rename chart name so selectors and resource names still match
# releases installed from the vendored charts (Deployment selectors are immutable).
nameOverride: proposals-cronjob-chart
